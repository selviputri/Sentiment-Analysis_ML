data:
  annotations: data/processed/annotations.csv
  raw_root: data/raw
  processed_root: data/processed
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

model:
  num_classes: 3
  pretrained: true

training:
  seed: 42
  batch_size: 32
  val_split: 0.2
  epochs: 10
  lr: 0.0001
  test_split: 0.1
  epochs: 20
  lr: 0.0003

dataloader:
  num_workers: 0
  pin_memory: false

augmentation:
  horizontal_flip: true
  horizontal_flip_prob: 0.5

debug:
  save_splits: true
  print_split_summary: true
